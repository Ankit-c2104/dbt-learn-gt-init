models:
  - name: stg_jaffle_shop__customers
    description: One unique customer per row
    columns: 
      - name: customer_id # primary key
        description: the primary key of the customers table
        data_tests:
          - unique
          - not_null
  
  - name: stg_jaffle_shop__orders
    description: One unique order per row
    columns: 
    # test 1
      - name: order_id # primary key
        description: the primary key of the orders table
        data_tests:
          - unique
          - not_null
    # test 2
      - name: status
        description: "{{ doc('order_status') }}" # reference to markdown file.
        data_tests:
          - accepted_values: 
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']
    # test 3
      - name: customer_id # original name as user id
        data_tests:
          - relationships:
              arguments:
                to: ref ('stg_jaffle_shop__customers')
                field: customer_id # from customers table