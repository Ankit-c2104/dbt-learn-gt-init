sources:
  - name: jaffle_shop # typically the name of the schema, but can name it something else as well
    database: raw # it by default assumes the database is the target database (ANALYTICS), but in our case the source database is RAW
    schema: jaffle_shop 
    tables: 
      - name: customers
        description: "This table contains all the customers of Jaffle Shop"
        
        columns:   ## adding source tests to the source table
          - name: id ## original name in the source table
            data_tests:
              - unique
              - not_null

      - name: orders
        description: "This table contains all the orders of Jaffle Shop"
        config:
          freshness:
            warn_after: 
              count: 24
              period: hour
            error_after:
              count: 48 # missed 2 days of worth of freshnes
              period: hour
          
          loaded_at_field: _etl_loaded_at


